spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/test
    driver-class-name: org.h2.Driver
    username: sa
    password: 1111
  servlet:
    multipart:
    file-size-threshold: 1MB
    tempLocation: D://images/tmp/
    location: D://images/origin/
    max-file-size: 100MB
    max-request-size: 100MB

  autoconfigure:
    exclude:org.springframework.boot.autoconfigure.security.SecurityAutoConfiguration

  security:
    user:
      name: user
      password: 1234

  jwt:
    secret-key: secretKey
    expiration-ms: 10000000

server:
  port: 7070
